{% extends "base.html" %}
{% block title %}Sign Up — iRacing Setups{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-logo">
    <h1>iRacing <span>Setups</span></h1>
    <p>Create your free account</p>
  </div>
  <div class="card">
    <form method="POST" action="/signup">
      <div class="form-group">
        <label class="form-label">Display Name</label>
        <input type="text" name="display_name" class="form-control" value="{{ display_name or '' }}" placeholder="Your name or gamertag">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ email or '' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" minlength="8" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
    </form>
  </div>
  <p style="text-align:center; margin-top:16px; color:var(--muted); font-size:14px;">
    Already have an account? <a href="/login">Log in</a>
  </p>
</div>
{% endblock %}
