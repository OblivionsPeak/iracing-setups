{% extends "base.html" %}
{% block title %}Reset Password — iRacing Setups{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-logo">
    <h1>iRacing <span>Setups</span></h1>
    <p>Choose a new password</p>
  </div>
  <div class="card">
    <form method="POST" action="/auth/reset">
      <input type="hidden" name="token" id="resetToken">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" name="new_password" class="form-control" minlength="8" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Update Password</button>
    </form>
  </div>
</div>
<script>
  // Extract token from URL hash (Supabase sends #access_token=...)
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  if (token) document.getElementById('resetToken').value = token;
</script>
{% endblock %}
